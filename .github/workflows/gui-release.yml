name: GUI installer

# Builds the Tauri desktop app and files a draft GitHub Release with the
# per-platform packages. Publishing the draft is the release act: the
# install scripts (gui/scripts/install-gui.*) resolve the newest published
# gui-v* release via the GitHub API and download its immutable assets.
# Trigger: push a tag like `gui-v0.1.0`, or run manually from the Actions
# tab (uploads app packages as build artifacts only).
on:
  push:
    tags: ["gui-v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg: windows-x64
            build: --no-bundle
          # Linux ships .tar.gz so the installer needs only tar (unzip is
          # not guaranteed on minimal systems).
          - os: ubuntu-latest
            pkg: linux-x64
            build: --no-bundle
          # macOS ships a real .app bundle (Launchpad/Spotlight need it);
          # the engine sidecar is embedded via externalBin. Apple Silicon
          # only — Intel Macs are not supported.
          - os: macos-latest
            pkg: darwin-arm64
            build: --bundles app
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          workspaces: |
            engine-rs
            gui/src-tauri

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: gui
        run: |
          npm ci
          npm run vendor

      - name: Build app
        working-directory: gui
        run: npx tauri build ${{ matrix.build }}

      - name: Stage app package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "dist/package" | Out-Null
          Copy-Item "gui/src-tauri/target/release/puppetty-gui.exe" "dist/package/puppetty-gui.exe"
          Copy-Item "engine-rs/target/release/puppetty-engine.exe" "dist/package/puppetty-engine.exe"
          Compress-Archive `
            -Path "dist/package/*" `
            -DestinationPath "dist/puppetty-gui-${{ matrix.pkg }}.zip" `
            -Force

      - name: Stage app package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/package
          cp gui/src-tauri/target/release/puppetty-gui dist/package/
          cp engine-rs/target/release/puppetty-engine dist/package/
          tar -czf "dist/puppetty-gui-${{ matrix.pkg }}.tar.gz" \
            -C dist/package puppetty-gui puppetty-engine

      # ditto, not Compress-Archive: the zip must preserve the executable
      # bits and the ad-hoc code-signature structure inside the .app, or
      # the unpacked app will not launch on Apple Silicon.
      - name: Stage app package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          test -d "gui/src-tauri/target/release/bundle/macos/puppetty-gui.app"
          ditto -c -k --keepParent \
            "gui/src-tauri/target/release/bundle/macos/puppetty-gui.app" \
            "dist/puppetty-gui-${{ matrix.pkg }}.zip"

      - name: Upload app package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: puppetty-gui-${{ matrix.pkg }}
          path: dist/puppetty-gui-${{ matrix.pkg }}.*
          if-no-files-found: error

  # The published release is the install source: assets are immutable from
  # the moment the draft is published, and nothing is installable until a
  # human reviews and publishes it.
  publish-release:
    if: startsWith(github.ref, 'refs/tags/gui-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: dist

      - name: Create draft release with package assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          find dist \( -name 'puppetty-gui-*.zip' -o -name 'puppetty-gui-*.tar.gz' \) \
            -exec cp {} assets/ \;
          cd assets
          for f in puppetty-gui-*; do
            sha256sum "$f" > "$f.sha256"
          done
          # The install scripts ship as release assets too: the stable
          # one-liner fetches releases/latest/download/install-gui.*, so
          # the whole install path — script included — goes live only
          # when the draft is published, immutably per release.
          cp ../gui/scripts/install-gui.ps1 ../gui/scripts/install-gui.sh .
          version="${GITHUB_REF_NAME#gui-v}"
          prerelease=""
          case "$version" in *-*) prerelease="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" ./* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --draft $prerelease
