name: GUI CI

on:
  pull_request:
    paths:
      - "gui/**"
      - "engine-rs/**"
      - ".github/workflows/gui-ci.yml"
      - ".github/workflows/gui-release.yml"
  push:
    branches: [main]
    paths:
      - "gui/**"
      - "engine-rs/**"
      - ".github/workflows/gui-ci.yml"
      - ".github/workflows/gui-release.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build: --no-bundle
          - os: ubuntu-latest
            build: --no-bundle
          # Exercise the release's .app bundling path on PRs, not just
          # compilation — macOS breakage should surface before tag time.
          - os: macos-latest
            build: --bundles app
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
          workspaces: |
            engine-rs
            gui/src-tauri

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # Debug profile: CI is a compile smoke check, and the release profile's
      # fat LTO link dominates build time. Releases still build with --release.
      - name: Install frontend dependencies
        working-directory: gui
        env:
          PUPPETTY_ENGINE_PROFILE: debug
        run: |
          npm ci
          npm run vendor

      - name: Build app
        working-directory: gui
        run: npx tauri build --debug ${{ matrix.build }}
