name: npm release

# Publishes the Rust engine to npm as platform binary packages plus the
# `puppetty` launcher shim (the esbuild/Biome model). Trigger: push a tag
# like `npm-v0.2.0`. Publishes via npm trusted publishing (OIDC): npmjs.com
# is configured to trust this repo + workflow file, so there is no
# long-lived token and npm attaches provenance attestations automatically.
on:
  push:
    tags: ["npm-v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            pkg: win32-x64
          - os: ubuntu-latest
            pkg: linux-x64-gnu
          - os: ubuntu-24.04-arm
            pkg: linux-arm64-gnu
          - os: macos-latest
            pkg: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: engine-rs
      - run: cargo build --release
        working-directory: engine-rs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bin-${{ matrix.pkg }}
          path: engine-rs/target/release/puppetty-engine*
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
      # Trusted publishing needs npm >= 11.5.1; Node 22 bundles npm 10.
      - run: npm install -g npm@latest
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
      - name: Publish platform packages and shim
        run: |
          VERSION="${GITHUB_REF_NAME#npm-v}"
          # Prerelease versions publish under the `beta` dist-tag so that
          # plain `npm install -g puppetty` keeps resolving the last stable.
          TAG="latest"
          case "$VERSION" in *-*) TAG="beta";; esac
          for dir in artifacts/bin-*; do
            pkg="${dir#artifacts/bin-}"
            os="${pkg%%-*}"
            cpu="$(echo "$pkg" | cut -d- -f2)"
            mkdir -p "pkg/$pkg"
            cp "$dir"/puppetty-engine* "pkg/$pkg/"
            chmod +x "pkg/$pkg"/puppetty-engine* || true
            node -e "
              require('fs').writeFileSync('pkg/$pkg/package.json', JSON.stringify({
                name: '@puppetty/$pkg', version: '$VERSION',
                description: 'puppetty engine binary ($pkg)',
                os: ['$os' === 'win32' ? 'win32' : '$os'], cpu: ['$cpu' === 'x64' ? 'x64' : 'arm64'],
                license: 'MIT',
                repository: { type: 'git', url: 'git+https://github.com/puppetty-org/puppetty.git' },
              }, null, 2))"
            npm publish "./pkg/$pkg" --access public --tag "$TAG"
          done
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            p.version = '$VERSION';
            for (const k of Object.keys(p.optionalDependencies)) p.optionalDependencies[k] = '$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p, null, 2))"
          npm publish --access public --tag "$TAG"
