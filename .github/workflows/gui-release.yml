name: GUI installer

# Builds the Tauri desktop app and files a draft GitHub Release with the
# per-platform packages. Publishing the draft is the release act: the
# install scripts (gui/scripts/install-gui.*) resolve the newest published
# gui-v* release via the GitHub API and download its immutable assets.
# Trigger: push a tag like `gui-v0.1.0`, or run manually from the Actions
# tab (uploads app packages as build artifacts only).
on:
  push:
    tags: ["gui-v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg: windows-x64
            exe: .exe
            build: --no-bundle
          - os: ubuntu-latest
            pkg: linux-x64
            exe: ""
            build: --no-bundle
          # macOS ships a real .app bundle (Launchpad/Spotlight need it);
          # the engine sidecar is embedded via externalBin. Apple Silicon
          # only — Intel Macs are not supported.
          - os: macos-latest
            pkg: darwin-arm64
            exe: ""
            build: --bundles app
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          workspaces: |
            engine-rs
            gui/src-tauri

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: gui
        run: |
          npm ci
          npm run vendor

      - name: Build app
        working-directory: gui
        run: npx tauri build ${{ matrix.build }}

      - name: Stage app package (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "dist/package" | Out-Null
          $gui = "gui/src-tauri/target/release/puppetty-gui${{ matrix.exe }}"
          $engine = "engine-rs/target/release/puppetty-engine${{ matrix.exe }}"
          Copy-Item $gui "dist/package/puppetty-gui${{ matrix.exe }}"
          Copy-Item $engine "dist/package/puppetty-engine${{ matrix.exe }}"
          Compress-Archive `
            -Path "dist/package/*" `
            -DestinationPath "dist/puppetty-gui-${{ matrix.pkg }}.zip" `
            -Force

      # ditto, not Compress-Archive: the zip must preserve the executable
      # bits and the ad-hoc code-signature structure inside the .app, or
      # the unpacked app will not launch on Apple Silicon.
      - name: Stage app package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          test -d "gui/src-tauri/target/release/bundle/macos/puppetty-gui.app"
          ditto -c -k --keepParent \
            "gui/src-tauri/target/release/bundle/macos/puppetty-gui.app" \
            "dist/puppetty-gui-${{ matrix.pkg }}.zip"

      - name: Upload app package artifact
        uses: actions/upload-artifact@v7
        with:
          name: puppetty-gui-${{ matrix.pkg }}
          path: dist/puppetty-gui-${{ matrix.pkg }}.zip

  # The published release is the install source: assets are immutable from
  # the moment the draft is published, and nothing is installable until a
  # human reviews and publishes it.
  publish-release:
    if: startsWith(github.ref, 'refs/tags/gui-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Create draft release with package assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p assets
          find dist -name 'puppetty-gui-*.zip' -exec cp {} assets/ \;
          cd assets
          for f in *.zip; do
            sha256sum "$f" > "$f.sha256"
          done
          version="${GITHUB_REF_NAME#gui-v}"
          prerelease=""
          case "$version" in *-*) prerelease="--prerelease";; esac
          gh release create "$GITHUB_REF_NAME" ./* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --draft $prerelease
