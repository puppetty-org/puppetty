name: Engine CI (Rust)

on:
  pull_request:
    paths: ["engine-rs/**", ".github/workflows/engine-ci.yml"]
  push:
    branches: [main]
    paths: ["engine-rs/**", ".github/workflows/engine-ci.yml"]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: engine-rs
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine-rs

      - run: cargo fmt --check

      - run: cargo clippy --all-targets -- -D warnings

      - run: cargo test
