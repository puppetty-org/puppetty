name: GUI release

# Builds the Tauri desktop app and publishes the Windows installer.
# Trigger: push a tag like `gui-v0.1.0` (publishes a GitHub Release), or run
# manually from the Actions tab (uploads the installer as a build artifact).
on:
  push:
    tags: ["gui-v*"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: gui/src-tauri

      - name: Install frontend dependencies
        working-directory: gui
        run: |
          npm ci
          npm run vendor

      - name: Build installer
        working-directory: gui
        run: npx tauri build

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/gui-v')
        uses: softprops/action-gh-release@v3
        with:
          files: gui/src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            Windows installer for the puppetty desktop GUI — all-in-one:
            the Rust engine is bundled inside the app. No Node.js, no npm
            install, no other prerequisites.

            The CLI/agent toolchain (`puppetty` command, MCP server) can
            additionally be installed via `npm install -g puppetty`, but
            the GUI does not require it.

            ## ⚠️ Windows SmartScreen warning

            The installer is not yet code-signed, so Windows shows a
            SmartScreen warning on first run. This is expected for new
            unsigned binaries — click **More info** (詳細情報), then
            **Run anyway** (実行):

            <img src="https://raw.githubusercontent.com/puppetty-org/puppetty/main/docs/smartscreen-1.png" width="380"> <img src="https://raw.githubusercontent.com/puppetty-org/puppetty/main/docs/smartscreen-2.png" width="380">

            Every release is built from tagged source by GitHub Actions and
            published immutably — see the
            [code signing policy](https://github.com/puppetty-org/puppetty/blob/main/CODE_SIGNING.md).
      - name: Upload artifact (manual run)
        if: "!startsWith(github.ref, 'refs/tags/gui-v')"
        uses: actions/upload-artifact@v7
        with:
          name: puppetty-gui-windows
          path: gui/src-tauri/target/release/bundle/nsis/*.exe
